# ─────────────────────────────────────────────────────────────────────────────
# process-articles.yml
# v1.3 — 2026-06-19 — concurrency guard (serialise runs) + rebase-safe push
#                     (fetch + rebase onto remote + retry) so concurrent saves
#                     can no longer strand an article with a rejected push
# v1.2 — 2026-02-28 — added workflow_dispatch for manual trigger
# v1.1 — 2026-02-28 — fixed "on" quoting (YAML boolean parse bug)
# v1.0 — 2026-02-28 — initial build for The Contrarian / FoodGameMedia
# ─────────────────────────────────────────────────────────────────────────────
# Fires on every push to articles/ in the main branch, or manually via Actions tab.
# Runs process_articles.py: injects FGM nav, rebuilds archive.html + archive.json

name: Process Contrarian Articles

"on":
  push:
    branches: [main]
    paths:
      - 'articles/**.html'
  workflow_dispatch:

# Only one run of this workflow at a time. Overlapping saves queue instead of
# racing, so two runs can never collide on the push. cancel-in-progress is false
# so a run that is mid-push is never killed and left half-done.
concurrency:
  group: process-articles
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run process_articles.py
        run: python .github/scripts/process_articles.py

      - name: Commit and push (rebase-safe)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/ archive.html archive.json

          if git diff --staged --quiet; then
            echo "No changes to commit — nothing to publish."
            exit 0
          fi

          git commit -m "Auto: nav inject + archive rebuild [skip ci]"

          # Push, but survive a remote that moved under us (race or manual push).
          # Fetch, rebase our single commit onto the latest remote, then push.
          # Retry a few times with backoff; abort any half-finished rebase first.
          for attempt in 1 2 3 4 5; do
            git fetch origin "${GITHUB_REF_NAME}"
            if git rebase "origin/${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "Pushed on attempt ${attempt}."
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            echo "Push attempt ${attempt} failed (remote moved). Retrying after backoff..."
            sleep $((attempt * 3))
          done

          echo "Push failed after 5 attempts."
          exit 1
